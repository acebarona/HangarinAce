{% extends 'base.html' %}
{% block title %}Sign Out — Hangarin{% endblock %}
{% block content %}
<!-- This wrapper ensures ONLY the Logout card is centered vertically -->
<div class="d-flex align-items-center justify-content-center" style="min-height: 75vh;">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="mb-4">
                    <!-- Changed to a clearer icon and color -->
                    <i class="fa-solid fa-door-open fa-3x text-primary"></i>
                </div>
                <h2 class="h4 fw-bold mb-3">Sign Out</h2>
                <p class="text-muted mb-4 small">Are you sure you want to sign out of your Hangarin account?</p>
                
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
                    {% endif %}
                    <button type="submit" class="btn btn-danger w-100 py-2 mb-3 fw-bold shadow-sm">
                        Yes, Sign Out
                    </button>
                    <div>
                        <a href="/" class="text-decoration-none small text-muted">
                            <i class="fa-solid fa-arrow-left me-1"></i> Stay Logged In
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
